<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - Task Management Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" :class="{ dark: darkMode }">
    <div class="layout">
      <aside class="sidebar">
        <div>
          <div class="logo-box">
            <div class="logo-icon">✓</div>
            <div>
              <h2>TaskFlow</h2>
              <p>Team Planner</p>
            </div>
          </div>

          <nav class="nav-links">
            <router-link to="/" exact>Dashboard</router-link>
            <router-link to="/tasks">All Tasks</router-link>
            <router-link to="/board">Board</router-link>
            <router-link to="/add">Add Task</router-link>
            <router-link to="/settings">Settings</router-link>
          </nav>
        </div>

        <div class="sidebar-footer">
          <div class="mini-card">
            <p class="mini-label">Current Mode</p>
            <strong>{{ darkMode ? 'Dark' : 'Light' }}</strong>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <div class="container">
          <transition name="fade" mode="out-in">
            <router-view></router-view>
          </transition>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <script src="https://unpkg.com/vue-router@3.6.5/dist/vue-router.js"></script>
  <script src="app.js"></script>
</body>
</html>
